name: Publish to npm

# Publishes on a version tag (v*) using npm "trusted publishing" via OIDC —
# no NPM_TOKEN secret is stored, and provenance is attached automatically.
#
# The published package is source-only (grammar.js + generated src/ + node
# bindings); consumers compile the native addon on install via node-gyp-build.
#
# One-time setup on npmjs.com (the package must already exist first — do an
# initial manual `npm publish` from a machine logged in as the scope owner):
#   npmjs.com -> @bootswithdefer/tree-sitter-groovy -> Settings
#     -> Trusted Publisher -> GitHub Actions:
#        Organization/user: bootswithdefer
#        Repository:        tree-sitter-groovy
#        Workflow filename: publish.yml
#
# Release flow:
#   1. bump "version" in package.json, tree-sitter.json, pyproject.toml,
#      Cargo.toml + update CHANGELOG.md
#   2. git tag -a vX.Y.Z -m "vX.Y.Z" && git push origin vX.Y.Z

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >= 11.5.1.
      - name: Ensure recent npm
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      # --ignore-scripts: skip the node-gyp-build native compile — not needed to
      # publish a source-only package, and avoids a CI toolchain dependency.
      - run: npm ci --ignore-scripts
      - run: npm publish --provenance --access public
